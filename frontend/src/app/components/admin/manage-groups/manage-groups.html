<div class="admin-layout">
  <nav class="navbar">
    <h1>Manage Groups</h1>
    <a routerLink="/admin">← Dashboard</a>
  </nav>

  <div class="container">
    <p class="success" *ngIf="message">{{ message }}</p>

    <div class="card">
      <h3>Create New Group</h3>
      <div class="form-row">
        <input type="text" placeholder="Group Name" [(ngModel)]="newGroup.groupName" />
        <input type="text" placeholder="Members (e.g. User1, User2)" [(ngModel)]="newGroup.groupMembers" />
        <button (click)="createGroup()">Create</button>
      </div>
    </div>

    <div class="card">
      <h3>All Groups</h3>
      <div *ngIf="groups.length === 0" class="no-items">No groups created yet.</div>
      <div class="group-item" *ngFor="let group of groups">
        <div>
          <strong>{{ group.groupName }}</strong>
          <p>Members: {{ group.groupMembers }}</p>
        </div>
        <button class="btn-delete" (click)="deleteGroup(group.groupId)">Delete</button>
      </div>
    </div>
  </div>
</div>
