<div class="admin-layout">
  <nav class="navbar">
    <h1>Reported Users</h1>
    <a routerLink="/admin">← Dashboard</a>
  </nav>

  <div class="container">
    <p class="success" *ngIf="message">{{ message }}</p>
    <div *ngIf="reports.length === 0" class="no-items">No reports found.</div>

    <div class="report-card" *ngFor="let report of reports">
      <div class="report-info">
        <p><strong>Reported User ID:</strong> {{ report.reportedUserId }}</p>
        <p><strong>Reported By:</strong> User #{{ report.reportingUserId }}</p>
        <p><strong>Reason:</strong> {{ report.reason }}</p>
        <p class="timestamp">{{ report.timestamp | date:'medium' }}</p>
      </div>
      <button class="btn-dismiss" (click)="dismiss(report.reportId)">Dismiss</button>
    </div>
  </div>
</div>
